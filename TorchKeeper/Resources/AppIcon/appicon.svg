<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Background -->
  <rect width="512" height="512" fill="#16223a"/>

  <!--
    Torch group — designed upright (flame at top), then rotated 45° CW
    so flame goes upper-right and handle goes lower-left.
    Pivot: (256, 285) ≈ visual centre of the full torch.
  -->
  <g transform="rotate(45, 256, 285)">

    <!-- ══════════════════════════════
         HANDLE  (tapered wooden stick)
         ══════════════════════════════ -->

    <!-- dark outline -->
    <path d="M 234,480 Q 245,492 256,492 Q 267,492 278,480 L 274,323 L 238,323 Z"
          fill="#120800"/>
    <!-- wood body -->
    <path d="M 238,473 Q 248,484 256,484 Q 264,484 274,473 L 270,329 L 242,329 Z"
          fill="#5c3117"/>
    <!-- left-side shadow for roundness -->
    <path d="M 242,329 L 238,473 Q 244,481 250,484 L 253,329 Z"
          fill="#3a1d0c" opacity="0.6"/>
    <!-- wood grain lines -->
    <path d="M 249,344 L 247,471" stroke="#7c4a20" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.50"/>
    <path d="M 257,337 L 255,476" stroke="#7c4a20" stroke-width="2.0" fill="none" stroke-linecap="round" opacity="0.35"/>
    <path d="M 265,342 L 263,473" stroke="#7c4a20" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.45"/>

    <!-- ══════════════════════════════
         BINDING  (wrapped cloth head)
         ══════════════════════════════ -->

    <!-- outline -->
    <path d="M 214,400 C 214,413 234,420 256,420 C 278,420 298,413 298,400
             L 298,317 C 298,304 278,297 256,297 C 234,297 214,304 214,317 Z"
          fill="#120800"/>
    <!-- body -->
    <path d="M 220,395 C 220,407 238,413 256,413 C 274,413 292,407 292,395
             L 292,323 C 292,311 274,303 256,303 C 238,303 220,311 220,323 Z"
          fill="#5c3117"/>
    <!-- left shadow -->
    <path d="M 220,323 C 220,311 238,303 248,303 L 248,413 C 238,413 220,407 220,395 Z"
          fill="#3a1d0c" opacity="0.50"/>
    <!-- wrap lines -->
    <path d="M 220,333 Q 256,337 292,333" stroke="#1c0a02" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 220,345 Q 256,349 292,345" stroke="#1c0a02" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 220,357 Q 256,361 292,357" stroke="#1c0a02" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 220,369 Q 256,373 292,369" stroke="#1c0a02" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 220,381 Q 256,385 292,381" stroke="#1c0a02" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- ══════════════════════════════
         FLAME LAYERS  (back to front)
         ══════════════════════════════

         Outline path: main blob with two upper-left spikes and one
         upper-right spike, matching the Gemini image silhouette.
    -->

    <!-- dark cartoon outline -->
    <path d="
      M 256,70
      C 278,70 322,94 343,136
      L 351,118 C 358,102 375,101 379,122
      C 383,142 370,163 358,168
      C 370,186 371,211 360,229
      C 373,235 383,252 377,270
      C 371,286 351,292 338,290
      C 330,315 313,328 293,331
      C 284,356 276,368 256,380
      C 236,368 228,356 219,331
      C 199,328 182,315 174,290
      C 161,292 141,286 135,270
      C 129,252 139,235 152,229
      C 141,211 142,186 154,168
      C 142,163 129,142 133,122
      C 137,101 154,100 161,118
      L 169,136
      C 190,94 234,70 256,70 Z
    " fill="#120800"/>

    <!-- orange outer fill -->
    <path d="
      M 256,84
      C 276,84 316,106 335,145
      L 342,130 C 348,115 363,115 367,133
      C 370,150 358,169 348,174
      C 359,191 360,214 350,230
      C 362,236 371,251 366,267
      C 360,281 342,287 331,286
      C 323,308 308,321 291,324
      C 282,347 275,358 256,369
      C 237,358 230,347 221,324
      C 204,321 189,308 181,286
      C 170,287 152,281 146,267
      C 141,251 150,236 162,230
      C 152,214 153,191 164,174
      C 154,169 142,150 145,133
      C 149,113 164,113 170,130
      L 177,145
      C 196,106 236,84 256,84 Z
    " fill="#e87010"/>

    <!-- red-orange inner flame -->
    <path d="
      M 256,132
      C 269,132 299,154 312,189
      C 319,210 319,234 313,252
      C 324,260 328,277 322,291
      C 316,304 300,314 285,317
      C 278,340 272,351 256,360
      C 240,351 234,340 227,317
      C 212,314 196,304 190,291
      C 184,277 188,260 199,252
      C 193,234 193,210 200,189
      C 213,154 243,132 256,132 Z
    " fill="#cc3808"/>

    <!-- amber-yellow flame -->
    <path d="
      M 256,187
      C 267,187 286,206 291,231
      C 295,252 293,275 286,291
      C 279,306 268,317 256,321
      C 244,317 233,306 226,291
      C 219,275 217,252 221,231
      C 226,206 245,187 256,187 Z
    " fill="#ffb200"/>

    <!-- bright yellow core -->
    <path d="
      M 256,222
      C 263,222 273,236 275,254
      C 277,271 274,288 268,299
      C 263,307 259,310 256,311
      C 253,310 249,307 244,299
      C 238,288 235,271 237,254
      C 239,236 249,222 256,222 Z
    " fill="#ffe040" opacity="0.88"/>

  </g>

</svg>
